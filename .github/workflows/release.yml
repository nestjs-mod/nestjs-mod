name: Release to NPM

on:
  push:
    branches:
      - 'master'

jobs:
  release:
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    runs-on: ubuntu-latest
    env:
      NX_SKIP_NX_CACHE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          cache: npm
          node-version: 23
      - run: npm ci
      - run: npm run generate
      - run: npm run build
      - run: npm run docs:infrastructure
      - run: npm run test
      # - run: npm run test:integrations-build
      # - run: npm run check-contrib
      - name: Semantic release with npm auth retry
        shell: bash
        run: |
          set +e

          LOG_FILE=$(mktemp)

          echo "=== First release attempt ==="

          npx nx run-many --target=semantic-release --all --parallel=false 2>&1 | tee "$LOG_FILE"

          EXIT_CODE=${PIPESTATUS[0]}

          if grep -q "Open https://www.npmjs.com/login/" "$LOG_FILE"; then
            echo ""
            echo "========================================="
            echo "NPM security key authentication detected"
            echo "Please authenticate in browser"
            echo "Waiting 30 seconds before retry..."
            echo "========================================="
            echo ""

            sleep 30

            echo "=== Second release attempt ==="

            npx nx run-many --target=semantic-release --all --parallel=false

            EXIT_CODE=$?
          fi

          exit $EXIT_CODE
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
